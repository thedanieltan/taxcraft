name: Software bug
description: Report a reproducible problem in the engine, API, calculator or automation.
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Do not include personal information, tax documents, secrets or production credentials.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Calculation engine
        - API
        - Reference calculator
        - Country-package SDK
        - Autonomous maintenance
        - Docker or local setup
        - Documentation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic or non-identifying values only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit, package version or deployment
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have removed personal data, taxpayer records and secrets.
          required: true
        - label: This is not a request for tax, legal, accounting or financial advice.
          required: true

name: Tax source watch

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tax-source-watch.yml"
      - "automation/**"
      - "packages/country-sg/src/**"
      - "packages/maintenance/**"
      - "scripts/watch-tax-sources.mjs"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: tax-source-watch
  cancel-in-progress: false

jobs:
  maintain:
    if: github.repository == 'thedanieltan/taxcraft'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Observe official sources and write verified candidate
        shell: bash
        run: |
          set +e
          node scripts/watch-tax-sources.mjs --write 2>&1 | tee /tmp/tax-source-watch.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Detect candidate changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate candidate
        if: steps.changes.outputs.changed == 'true'
        run: |
          git diff --check
          npm run check
      - name: Open and merge checked candidate PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="bot/tax-source-${GITHUB_RUN_ID}"
          git config user.name "taxcraft-maintenance[bot]"
          git config user.email "taxcraft-maintenance[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add automation packages/country-sg/src
          git commit -m "Update verified Singapore tax source model"
          git push --set-upstream origin "$branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "Update verified Singapore tax source model" \
            --body "Automated official-source update from run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. Both independent extractors agreed, lifecycle validation passed, and the full repository check completed before this pull request was opened.")
          gh pr merge "$pr_url" --squash --delete-branch
      - name: Report blocked source watch
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title="Tax source watch blocked"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          issue_number=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search 'Tax source watch blocked in:title' --json number,title --jq '.[] | select(.title == "Tax source watch blocked") | .number' | head -n 1)
          {
            echo "The autonomous tax source watch was blocked. The current calculator was not modified."
            echo
            echo "Review run: ${run_url}"
            if [ -s /tmp/tax-source-watch.log ]; then
              echo
              echo "Diagnostic tail:"
              echo '```text'
              tail -n 30 /tmp/tax-source-watch.log
              echo '```'
            fi
          } > /tmp/tax-source-watch-report.md
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --repo "$GITHUB_REPOSITORY" --body-file /tmp/tax-source-watch-report.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body-file /tmp/tax-source-watch-report.md
          fi
      - name: Close recovered source watch issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          issue_number=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search 'Tax source watch blocked in:title' --json number,title --jq '.[] | select(.title == "Tax source watch blocked") | .number' | head -n 1)
          if [ -n "$issue_number" ]; then
            gh issue close "$issue_number" --repo "$GITHUB_REPOSITORY" --comment "The official-source watch completed successfully and has recovered."
          fi

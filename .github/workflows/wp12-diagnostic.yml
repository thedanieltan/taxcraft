name: WP12 diagnostic

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/country-gb/**"
      - "packages/country-sg/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/wp12-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build --silent >/dev/null
      - name: API tests
        shell: bash
        run: |
          set +e
          node --test apps/api/test/api.test.js apps/api/test/worksheet.test.js > /tmp/api-test.log 2>&1
          status=$?
          cat /tmp/api-test.log
          exit "$status"

name: WP12 diagnostic

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/country-gb/**"
      - "packages/country-sg/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/wp12-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - run: npm run build --silent >/dev/null
      - name: Jurisdiction discovery
        run: node --test --test-name-pattern="lists maintained jurisdictions" apps/api/test/api.test.js
      - name: Singapore calculation
        if: always()
        run: node --test --test-name-pattern="calculates through the official Singapore" apps/api/test/api.test.js
      - name: UK calculation
        if: always()
        run: node --test --test-name-pattern="calculates UK non-savings" apps/api/test/api.test.js
      - name: Privacy logging
        if: always()
        run: node --test --test-name-pattern="rejects identity-bearing" apps/api/test/api.test.js
      - name: OpenAPI document
        if: always()
        run: node --test --test-name-pattern="serves a small OpenAPI" apps/api/test/api.test.js
      - name: Not-found response
        if: always()
        run: node --test --test-name-pattern="returns explicit not-found" apps/api/test/api.test.js
      - name: Worksheet OpenAPI
        if: always()
        run: node --test --test-name-pattern="OpenAPI exposes" apps/api/test/worksheet.test.js
      - name: Worksheet calculation
        if: always()
        run: node --test --test-name-pattern="worksheet endpoint returns" apps/api/test/worksheet.test.js
      - name: Worksheet identity rejection
        if: always()
        run: node --test --test-name-pattern="worksheet endpoint rejects" apps/api/test/worksheet.test.js

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      failure-summary: ${{ steps.repository-check.outputs.failure-summary }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run repository checks
        id: repository-check
        shell: bash
        run: |
          if npm run check > /tmp/taxcraft-check.log 2>&1; then
            cat /tmp/taxcraft-check.log
          else
            summary=$(awk '
              /^not ok / { capture = 1 }
              capture {
                line = $0
                gsub(/[[:space:]]+/, " ", line)
                printf "%s | ", line
                count++
              }
              capture && count >= 12 { exit }
            ' /tmp/taxcraft-check.log)
            if [ -z "$summary" ]; then
              summary=$(grep --max-count 1 --extended-regexp 'AssertionError|Error:|failed|missing final newline|trailing whitespace|tab character|invalid JSON' /tmp/taxcraft-check.log || true)
            fi
            if [ -z "$summary" ]; then
              summary="repository checks failed"
            fi
            summary=$(printf '%s' "$summary" | cut --characters 1-240)
            echo "failure-summary=$summary" >> "$GITHUB_OUTPUT"
            echo "Repository checks failed. Showing the diagnostic tail." >&2
            tail --lines 200 /tmp/taxcraft-check.log >&2
            exit 1
          fi

  diagnostic:
    needs: check
    if: ${{ always() && needs.check.result == 'failure' }}
    name: "Failure: ${{ needs.check.outputs.failure-summary }}"
    runs-on: ubuntu-latest
    steps:
      - name: Report failure summary
        env:
          FAILURE_SUMMARY: ${{ needs.check.outputs.failure-summary }}
        run: printf '%s\n' "$FAILURE_SUMMARY"

  container:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build service image
        run: docker build --tag taxcraft:test .
      - name: Run stateless service smoke test
        shell: bash
        run: |
          container_id=$(docker run --detach --publish 127.0.0.1:3000:3000 taxcraft:test)
          trap 'docker logs "$container_id"; docker rm --force "$container_id"' EXIT

          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --dump-header /tmp/headers http://127.0.0.1:3000/v1/jurisdictions --output /tmp/jurisdictions.json; then
              break
            fi
            sleep 1
          done

          grep --quiet '"jurisdiction":"SG"' /tmp/jurisdictions.json
          if grep --ignore-case --quiet '^set-cookie:' /tmp/headers; then
            echo "TaxCraft must not set cookies." >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            --header 'content-type: application/json' \
            --data '{"jurisdiction":"SG","taxYear":"YA2026","facts":{"taxResident":true,"chargeableIncomeMinor":10000000}}' \
            http://127.0.0.1:3000/v1/calculate \
            | grep --quiet '"netTaxPayableMinor":565000'
